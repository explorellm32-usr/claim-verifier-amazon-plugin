<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" type="text/css" href="popup.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <h1>Claim Verifier <span class="badge">AI</span></h1>
    <p id="status">Ready to analyze this Amazon product.</p>
    <button id="analyzeBtn">Analyze Product</button>
    <div id="resultBox" class="hidden">
      <div id="fakeReviewWarning" class="hidden">⚠️ Warning: Bot-like or paid reviews detected!</div>
      <div id="verdictBadge">WAITING</div>
      <p id="summaryText"></p>
      <div id="evidenceBox" class="hidden">
        <strong>Evidence:</strong> <span id="evidenceQuote"></span>
      </div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
